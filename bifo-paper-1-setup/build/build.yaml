# Manubot build configuration
# See https://github.com/manubot/rootstock for full documentation

# Manuscript versioning
# When set to true, the CI build will include a version timestamp
versioning: true

# Citation configuration
# Manubot resolves citations from DOIs, PubMed IDs, arXiv IDs, etc.
# Set to true to enable citation caching (recommended for large manuscripts)
citation-tags-path: build/citations.tsv

# Pandoc options
pandoc:
  citeproc: true
  bibliography: build/references.json

# Output formats
# These are generated by the CI build
outputs:
  - html
  - pdf
  - docx
